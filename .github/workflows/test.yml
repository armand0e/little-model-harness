name: Pull request checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest ruff mypy
      - name: Static checks
        run: |
          ruff check .
          mypy harness --ignore-missing-imports --check-untyped-defs --no-error-summary
          python -m compileall -q .
      - name: Frontend syntax
        run: >-
          node -e "const fs=require('fs'),s=fs.readFileSync('web/index.html','utf8'),
          a=s.indexOf('<script>')+8,b=s.lastIndexOf('</script>');
          if(a<8||b<a)throw Error('main script not found');
          new Function(s.slice(a,b));"
      - name: Tests
        run: python -m pytest -q
