name: Build installers

# Run manually from the Actions tab, or push a tag like v1.0.0 to also
# attach the installers to a GitHub release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build app + installer
        run: powershell -File packaging\build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: LittleHarness-Setup
          path: dist/LittleHarness-Setup.exe

  linux:
    # oldest supported runner = oldest glibc the AppImage requires
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build AppImage
        run: bash packaging/build_appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: LittleHarness-AppImage
          path: dist/LittleHarness-x86_64.AppImage

  macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest   # Apple Silicon
            arch: arm64
          - runner: macos-13       # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build .app + DMG
        run: bash packaging/build_macos.sh
      - name: Arch-tag the DMG
        run: mv dist/LittleHarness.dmg dist/LittleHarness-${{ matrix.arch }}.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: LittleHarness-DMG-${{ matrix.arch }}
          path: dist/LittleHarness-${{ matrix.arch }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
